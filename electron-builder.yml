appId: com.pmaer.app
productName: PMAer
copyright: Copyright © 2026

directories:
  output: dist_electron

files:
  - dist/**/*
  - electron/dist/**/*
  - "!**/*.ts"
  - "!**/.gitignore"
  - "!**/node_modules/.cache"
  - "!**/node_modules"
  - "!**/__tests__"

# sql.js 的 wasm 必须随包分发，并由 initDatabase() 的 locateFile 从 resourcesPath 读取
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
  - from: build/icon.256x256.png
    to: icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "PMAer-${version}-Setup.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/installer-header.png
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PMAer

publish:
  provider: github
  owner: JasonXHY
  repo: ProjectManagement
