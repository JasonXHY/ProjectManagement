<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="#FFF5EE"/>
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="none" stroke="#E8DDD5" stroke-width="2"/>
  
  <!-- Tail (behind body) -->
  <path d="M 95 195 Q 55 210, 45 185 Q 35 160, 55 150 Q 75 140, 85 155" 
        fill="none" stroke="#B8A8A0" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Body - oval shape -->
  <ellipse cx="138" cy="160" rx="42" ry="48" fill="#E8DDD5"/>
  <ellipse cx="138" cy="160" rx="42" ry="48" fill="none" stroke="#8B7D74" stroke-width="3"/>
  
  <!-- Belly patch -->
  <ellipse cx="138" cy="168" rx="26" ry="30" fill="#F5EDE8"/>
  
  <!-- Left arm (behind back) -->
  <path d="M 98 148 Q 88 155, 92 168" fill="none" stroke="#8B7D74" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right arm (behind back) -->
  <path d="M 178 148 Q 188 155, 184 168" fill="none" stroke="#8B7D74" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left foot -->
  <ellipse cx="118" cy="206" rx="14" ry="7" fill="#E8DDD5" stroke="#8B7D74" stroke-width="2.5"/>
  
  <!-- Right foot -->
  <ellipse cx="158" cy="206" rx="14" ry="7" fill="#E8DDD5" stroke="#8B7D74" stroke-width="2.5"/>
  
  <!-- Head - round -->
  <circle cx="138" cy="100" r="38" fill="#E8DDD5"/>
  <circle cx="138" cy="100" r="38" fill="none" stroke="#8B7D74" stroke-width="3"/>
  
  <!-- Left ear -->
  <ellipse cx="108" cy="68" rx="14" ry="18" fill="#E8DDD5" stroke="#8B7D74" stroke-width="3"/>
  <ellipse cx="108" cy="68" rx="8" ry="12" fill="#F0C0B8"/>
  
  <!-- Right ear -->
  <ellipse cx="168" cy="68" rx="14" ry="18" fill="#E8DDD5" stroke="#8B7D74" stroke-width="3"/>
  <ellipse cx="168" cy="68" rx="8" ry="12" fill="#F0C0B8"/>
  
  <!-- Snout / nose area -->
  <ellipse cx="138" cy="108" rx="16" ry="12" fill="#F5EDE8"/>
  <ellipse cx="138" cy="108" rx="16" ry="12" fill="none" stroke="#8B7D74" stroke-width="2"/>
  
  <!-- Nose -->
  <ellipse cx="138" cy="103" rx="5" ry="3.5" fill="#8B7D74"/>
  
  <!-- Left eye -->
  <circle cx="124" cy="92" r="4" fill="#4A3F38"/>
  <circle cx="125.5" cy="90.5" r="1.5" fill="#fff"/>
  
  <!-- Right eye -->
  <circle cx="152" cy="92" r="4" fill="#4A3F38"/>
  <circle cx="153.5" cy="90.5" r="1.5" fill="#fff"/>
  
  <!-- Mouth -->
  <path d="M 132 112 Q 138 115, 144 112" fill="none" stroke="#8B7D74" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Whiskers -->
  <line x1="115" y1="105" x2="95" y2="100" stroke="#C4B5AB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="115" y1="110" x2="93" y2="112" stroke="#C4B5AB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="161" y1="105" x2="181" y2="100" stroke="#C4B5AB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="161" y1="110" x2="183" y2="112" stroke="#C4B5AB" stroke-width="1.5" stroke-linecap="round"/>
</svg>